<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>SloopLop</title>

  <link
    rel="icon"
    type="image/png"
    href="./assets/images/slooplop-logo.png">

  <link
    rel="stylesheet"
    href="./ai/styles/ai.css">

</head>

<body>

  <div class="app">

    <div class="logo-container">

      <img
        src="./assets/images/slooplop-logo.png"
        alt="SloopLop Logo"
        class="main-logo">

    </div>

    <h1 class="title">
      Cognitive Prototype V0.4
    </h1>

    <div id="chat-container"></div>

    <div class="input-area">

      <input
        type="text"
        id="user-input"
        placeholder="Talk to SL..."
        autocomplete="off">

      <button id="send-btn">
        Send
      </button>

    </div>

  </div>

  <script
    type="module"
    src="./ai/input.js">
  </script>

</body>

</html>
