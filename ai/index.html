<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>SL V0.4</title>

  <link
    rel="stylesheet"
    href="./styles/ai.css"
  >

  <!-- Inter Font -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- KaTeX -->

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
  >

  <script
    defer
    src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
  ></script>

  <script
    defer
    src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  ></script>

</head>

<body>

  <div class="app">

    <!-- Header -->

    <div class="topBar">

      <div>

        <div class="title">
          SL
        </div>

        <div class="subtitle">
          Cognitive Prototype V0.4
        </div>

      </div>

      <div class="statusDot"></div>

    </div>

    <!-- Chat -->

    <div
      id="chat"
      class="chat"
    ></div>

    <!-- Input -->

    <div class="inputRow">

      <input
        id="input"
        autocomplete="off"
        placeholder="Talk to SL..."
      >

      <button
        id="sendBtn"
        type="button"
      >
        Send
      </button>

    </div>

  </div>

  <script
    type="module"
    src="./app.js"
  ></script>

</body>

</html>
