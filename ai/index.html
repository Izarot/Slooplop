<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SloopLop AI</title>

  <link rel="stylesheet" href="./styles/ai.css" />
</head>

<body>

  <div class="app">

    <div class="header">

      <img
        src="../assets/images/slooplop-logo.png"
        alt="SloopLop Logo"
        class="logo"
      />

      <div class="title-box">
        <h1>SloopLop</h1>
        <p>Cognitive Prototype V0.4</p>
      </div>

    </div>

    <div
      class="chat-box"
      id="chatBox"
    >
    </div>

    <div class="input-area">

      <input
        type="text"
        id="userInput"
        placeholder="Talk to SL..."
      />

      <button id="sendBtn">
        SEND
      </button>

    </div>

  </div>

  <script type="module" src="./core.js"></script>

</body>

</html>
